database:
  host: "localhost"
  port: 5432
  name: "my_database"
  user: "my_user"
  password: "my_password"

api:
  api_key: "your_api_key_here"
  api_secret: "your_api_secret_here"
  base_url: "https://api.example.com"
  endpoints:
    - uri: "/api/diagnostics/interface/search_arp/"
      method: "POST"
      response_type: "application/json"
      params: ""
      request_body: 
        current: 1
        rowCount: 50
        resolve: "no"

    - uri: "/api/diagnostics/interface/getInterfaceStatistics"
      method: "GET"
      response_type: "application/json"
      params: ""
      request_body: {}

    - uri: "/api/diagnostics/firewall/query_pf_top"
      method: "POST"
      response_type: "application/json"
      params: ""
      request_body:
        current: 1
        rowCount: 50
    
    - uri: "/api/diagnostics/firewall/query_states"
      method: "POST"
      response_type: "application/json"
      params: ""
      request_body:
        current: 1
        rowCount: 50